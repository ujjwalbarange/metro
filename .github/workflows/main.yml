name: Build Android APK
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./metro_prototype

    steps:
      # Updated to v4
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter pub get
      
      - run: flutter build apk --release
      
      # Updated to v4
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: metro_prototype/build/app/outputs/flutter-apk/app-release.apk
          
